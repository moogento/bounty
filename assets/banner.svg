<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="bounty — competitive multi-agent bug discovery">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1a2332" stroke-width="1"/>
    </pattern>
    <linearGradient id="fade" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#0a0e1a" stop-opacity="0"/>
      <stop offset="1" stop-color="#0a0e1a" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="#0a0e1a"/>
  <rect width="1200" height="320" fill="url(#grid)" opacity="0.5"/>
  <rect width="1200" height="320" fill="url(#fade)" opacity="0.6"/>

  <!-- WANTED stamp (top-right) -->
  <g transform="translate(1000 60) rotate(-6)">
    <rect x="-4" y="-4" width="160" height="72" fill="none" stroke="#ef4444" stroke-width="3" rx="6"/>
    <text x="76" y="28" fill="#ef4444" font-family="'Courier New', monospace" font-size="30" font-weight="800" text-anchor="middle" letter-spacing="4">WANTED</text>
    <text x="76" y="52" fill="#ef4444" font-family="'Courier New', monospace" font-size="11" text-anchor="middle" letter-spacing="1">DEAD · OR · FIXED</text>
  </g>

  <!-- wordmark -->
  <text x="80" y="180" fill="#f9fafb" font-family="'Courier New', monospace" font-weight="800" font-size="150" letter-spacing="-4">bounty</text>

  <!-- blinking caret -->
  <rect x="620" y="90" width="14" height="90" fill="#f59e0b">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- subtitle -->
  <text x="82" y="225" fill="#9ca3af" font-family="'Courier New', monospace" font-size="22">competitive multi-agent bug discovery</text>

  <!-- agent dots + caption -->
  <g transform="translate(82 262)">
    <circle cx="0"   cy="0" r="9" fill="#ef4444"/>
    <circle cx="26"  cy="0" r="9" fill="#f59e0b"/>
    <circle cx="52"  cy="0" r="9" fill="#fbbf24"/>
    <circle cx="78"  cy="0" r="9" fill="#10b981"/>
    <circle cx="104" cy="0" r="9" fill="#3b82f6"/>
    <circle cx="130" cy="0" r="9" fill="#8b5cf6"/>
    <circle cx="156" cy="0" r="9" fill="#e5e7eb"/>
    <circle cx="182" cy="0" r="9" fill="#6b7280"/>
    <text x="214" y="5" fill="#6b7280" font-family="'Courier New', monospace" font-size="15">8 specialists · 1 leaderboard · no groupthink</text>
  </g>
</svg>
