<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" role="img" aria-label="bounty phases diagram">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5 0 10z" fill="#4b5563"/>
    </marker>
  </defs>

  <rect width="1200" height="440" fill="#0a0e1a"/>

  <!-- title -->
  <text x="600" y="44" fill="#e5e7eb" font-family="'Courier New', monospace" font-size="18" text-anchor="middle" letter-spacing="3">7 PHASES · FULLY AUTONOMOUS</text>

  <!-- card template: 140w x 170h -->
  <!-- positions: x = 40, 200, 360, 520, 680, 840, 1000 -->

  <!-- P0 Init -->
  <g transform="translate(40 100)">
    <rect width="140" height="170" rx="10" fill="#111827" stroke="#1f2937"/>
    <rect width="4" height="170" rx="2" fill="#6b7280"/>
    <text x="16" y="34" fill="#6b7280" font-family="'Courier New', monospace" font-size="12" font-weight="700">P0</text>
    <text x="70" y="88" fill="#e5e7eb" font-family="'Courier New', monospace" font-size="18" font-weight="700" text-anchor="middle">Init</text>
    <text x="70" y="112" fill="#9ca3af" font-family="'Courier New', monospace" font-size="11" text-anchor="middle">config + state</text>
    <text x="70" y="150" fill="#6b7280" font-family="'Courier New', monospace" font-size="10" text-anchor="middle">— no model —</text>
  </g>

  <!-- P1 Recon -->
  <g transform="translate(200 100)">
    <rect width="140" height="170" rx="10" fill="#111827" stroke="#1f2937"/>
    <rect width="4" height="170" rx="2" fill="#34d399"/>
    <text x="16" y="34" fill="#34d399" font-family="'Courier New', monospace" font-size="12" font-weight="700">P1</text>
    <text x="70" y="88" fill="#e5e7eb" font-family="'Courier New', monospace" font-size="18" font-weight="700" text-anchor="middle">Recon</text>
    <text x="70" y="112" fill="#9ca3af" font-family="'Courier New', monospace" font-size="11" text-anchor="middle">shared briefing</text>
    <rect x="30" y="134" width="80" height="22" rx="11" fill="#064e3b"/>
    <text x="70" y="150" fill="#34d399" font-family="'Courier New', monospace" font-size="11" text-anchor="middle">1 · Sonnet</text>
  </g>

  <!-- P2 Hunt (with 8 dots to show parallel) -->
  <g transform="translate(360 100)">
    <rect width="140" height="170" rx="10" fill="#111827" stroke="#1f2937"/>
    <rect width="4" height="170" rx="2" fill="#34d399"/>
    <text x="16" y="34" fill="#34d399" font-family="'Courier New', monospace" font-size="12" font-weight="700">P2</text>
    <text x="70" y="66" fill="#e5e7eb" font-family="'Courier New', monospace" font-size="18" font-weight="700" text-anchor="middle">Hunt</text>
    <!-- 8 specialist dots -->
    <g transform="translate(36 82)">
      <circle cx="0"  cy="0" r="5" fill="#ef4444"/>
      <circle cx="14" cy="0" r="5" fill="#f59e0b"/>
      <circle cx="28" cy="0" r="5" fill="#fbbf24"/>
      <circle cx="42" cy="0" r="5" fill="#10b981"/>
      <circle cx="56" cy="0" r="5" fill="#3b82f6"/>
      <circle cx="0"  cy="14" r="5" fill="#8b5cf6"/>
      <circle cx="14" cy="14" r="5" fill="#e5e7eb"/>
      <circle cx="28" cy="14" r="5" fill="#6b7280"/>
    </g>
    <text x="70" y="120" fill="#9ca3af" font-family="'Courier New', monospace" font-size="11" text-anchor="middle">parallel specialists</text>
    <rect x="30" y="134" width="80" height="22" rx="11" fill="#064e3b"/>
    <text x="70" y="150" fill="#34d399" font-family="'Courier New', monospace" font-size="11" text-anchor="middle">8 · Sonnet</text>
  </g>

  <!-- P3 Vote -->
  <g transform="translate(520 100)">
    <rect width="140" height="170" rx="10" fill="#111827" stroke="#1f2937"/>
    <rect width="4" height="170" rx="2" fill="#60a5fa"/>
    <text x="16" y="34" fill="#60a5fa" font-family="'Courier New', monospace" font-size="12" font-weight="700">P3</text>
    <text x="70" y="88" fill="#e5e7eb" font-family="'Courier New', monospace" font-size="18" font-weight="700" text-anchor="middle">Vote</text>
    <text x="70" y="112" fill="#9ca3af" font-family="'Courier New', monospace" font-size="11" text-anchor="middle">valid / FP / abstain</text>
    <rect x="30" y="134" width="80" height="22" rx="11" fill="#0c4a6e"/>
    <text x="70" y="150" fill="#60a5fa" font-family="'Courier New', monospace" font-size="11" text-anchor="middle">N−1 · Haiku</text>
  </g>

  <!-- P4 Queue -->
  <g transform="translate(680 100)">
    <rect width="140" height="170" rx="10" fill="#111827" stroke="#1f2937"/>
    <rect width="4" height="170" rx="2" fill="#6b7280"/>
    <text x="16" y="34" fill="#6b7280" font-family="'Courier New', monospace" font-size="12" font-weight="700">P4</text>
    <text x="70" y="88" fill="#e5e7eb" font-family="'Courier New', monospace" font-size="18" font-weight="700" text-anchor="middle">Queue</text>
    <text x="70" y="112" fill="#9ca3af" font-family="'Courier New', monospace" font-size="11" text-anchor="middle">severity policy</text>
    <text x="70" y="150" fill="#6b7280" font-family="'Courier New', monospace" font-size="10" text-anchor="middle">— orchestrator —</text>
  </g>

  <!-- P5 Fix -->
  <g transform="translate(840 100)">
    <rect width="140" height="170" rx="10" fill="#111827" stroke="#1f2937"/>
    <rect width="4" height="170" rx="2" fill="#a78bfa"/>
    <text x="16" y="34" fill="#a78bfa" font-family="'Courier New', monospace" font-size="12" font-weight="700">P5</text>
    <text x="70" y="88" fill="#e5e7eb" font-family="'Courier New', monospace" font-size="18" font-weight="700" text-anchor="middle">Fix</text>
    <text x="70" y="112" fill="#9ca3af" font-family="'Courier New', monospace" font-size="11" text-anchor="middle">2 reviewers must ✓</text>
    <rect x="30" y="134" width="80" height="22" rx="11" fill="#4c1d95"/>
    <text x="70" y="150" fill="#a78bfa" font-family="'Courier New', monospace" font-size="11" text-anchor="middle">3 · Opus</text>
  </g>

  <!-- P6 Ship -->
  <g transform="translate(1000 100)">
    <rect width="140" height="170" rx="10" fill="#111827" stroke="#1f2937"/>
    <rect width="4" height="170" rx="2" fill="#f59e0b"/>
    <text x="16" y="34" fill="#f59e0b" font-family="'Courier New', monospace" font-size="12" font-weight="700">P6</text>
    <text x="70" y="88" fill="#e5e7eb" font-family="'Courier New', monospace" font-size="18" font-weight="700" text-anchor="middle">Ship</text>
    <text x="70" y="112" fill="#9ca3af" font-family="'Courier New', monospace" font-size="11" text-anchor="middle">PR + issues</text>
    <text x="70" y="150" fill="#6b7280" font-family="'Courier New', monospace" font-size="10" text-anchor="middle">— gh cli —</text>
  </g>

  <!-- arrows between cards -->
  <g stroke="#4b5563" stroke-width="2" fill="none">
    <line x1="184" y1="185" x2="196" y2="185" marker-end="url(#arrow)"/>
    <line x1="344" y1="185" x2="356" y2="185" marker-end="url(#arrow)"/>
    <line x1="504" y1="185" x2="516" y2="185" marker-end="url(#arrow)"/>
    <line x1="664" y1="185" x2="676" y2="185" marker-end="url(#arrow)"/>
    <line x1="824" y1="185" x2="836" y2="185" marker-end="url(#arrow)"/>
    <line x1="984" y1="185" x2="996" y2="185" marker-end="url(#arrow)"/>
  </g>

  <!-- footer note -->
  <g transform="translate(600 330)">
    <text y="0" fill="#6b7280" font-family="'Courier New', monospace" font-size="13" text-anchor="middle">every agent runs in an isolated git worktree · no agent can break your working tree</text>
    <text y="28" fill="#9ca3af" font-family="'Courier New', monospace" font-size="13" text-anchor="middle">+1 confirmed · +1 fix approved · −3 false positive</text>
  </g>

  <!-- legend -->
  <g transform="translate(40 390)">
    <rect x="0" y="-11" width="14" height="14" rx="2" fill="#60a5fa"/>
    <text x="22" y="0" fill="#9ca3af" font-family="'Courier New', monospace" font-size="12">Haiku — cheap verdicts</text>
    <rect x="220" y="-11" width="14" height="14" rx="2" fill="#34d399"/>
    <text x="242" y="0" fill="#9ca3af" font-family="'Courier New', monospace" font-size="12">Sonnet — breadth hunting</text>
    <rect x="450" y="-11" width="14" height="14" rx="2" fill="#a78bfa"/>
    <text x="472" y="0" fill="#9ca3af" font-family="'Courier New', monospace" font-size="12">Opus — fixing</text>
  </g>
</svg>
